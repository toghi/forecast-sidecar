# drift-check workflow (T074c, SC-015): scheduled `terraform plan
# -detailed-exitcode` on both envs. Non-zero exit code (drift detected)
# fails the workflow and pages Sentry.
name: drift-check

on:
  schedule:
    # Daily at 04:00 UTC, off-peak.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: staging
            wif_provider_var: GCP_WIF_PROVIDER_STAGING
            sa_var: GCP_TF_SA_STAGING
          - env: production
            wif_provider_var: GCP_WIF_PROVIDER_PRODUCTION
            sa_var: GCP_TF_SA_PRODUCTION
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars[matrix.wif_provider_var] }}
          service_account: ${{ vars[matrix.sa_var] }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: terraform plan -detailed-exitcode (${{ matrix.env }})
        id: plan
        working-directory: infra/environments/${{ matrix.env }}
        # exit codes: 0 = no diff, 1 = error, 2 = diff (drift)
        run: |
          terraform init -backend-config="bucket=${{ vars.TFSTATE_BUCKET_PREFIX }}-${{ matrix.env }}"
          set +e
          terraform plan -detailed-exitcode -refresh=true -no-color > plan.txt
          ec=$?
          set -e
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          cat plan.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-plan-${{ matrix.env }}-${{ github.run_id }}
          path: infra/environments/${{ matrix.env }}/plan.txt
          retention-days: 30

      - name: Notify Sentry on drift
        if: steps.plan.outputs.exit_code == '2'
        run: |
          curl -X POST "${{ secrets.SENTRY_INGEST_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "Terraform drift detected in '${{ matrix.env }}'",
              "level": "warning",
              "extra": {
                "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "env": "${{ matrix.env }}"
              }
            }'

      - name: Fail workflow on drift
        if: steps.plan.outputs.exit_code == '2'
        run: exit 2
