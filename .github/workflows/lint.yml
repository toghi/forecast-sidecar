# lint workflow (T070, T085, T087): ruff, mypy, gitleaks, terraform fmt,
# lychee link-check, env-contract, terraform-secrets-check.
name: lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run mypy src/

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - run: terraform fmt -check -recursive infra/

  docs-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml README.md docs/ specs/
          fail: true

  env-contract:
    # T085 / SC-020: every Settings field has a matching `KEY=` line in .env.example.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/contract/test_env_contract.py -q

  terraform-secrets-check:
    # T087 / SC-019: no plaintext value where a secret_key_ref is expected.
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Plan staging (offline)
        working-directory: infra/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
          terraform plan -refresh=false -out=plan.tfplan
          terraform show -json plan.tfplan > plan.json
      - name: Assert all secret env bindings use secret_key_ref
        run: |
          uv run python ci_helpers/check_secret_bindings.py infra/environments/staging/plan.json || \
          (echo "FAIL: a Cloud Run env binding contains a plaintext secret value" && exit 1)
